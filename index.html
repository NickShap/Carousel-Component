<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Carousel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-dark text-light">
    <div class="container my-5">
        <h1 class="text-center mb-4">Bootstrap Carousel Examples</h1>
        <!-- First Row: 1 Carousel -->
        <div class="row  justify-content-center mb-4">
            <div class="col-12">
                <h2 class="text-center mb-3">Full Width Carousel</h2>
                <div id="carouselExample" class="carousel slide">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="img/beagle.jpg" class="d-block w-100 img-fluid" alt="Beagle">
                        </div>
                        <div class="carousel-item active">
                            <img src="img/cockatiel.jpg" class="d-block w-100 img-fluid" alt="Beagle">
                        </div>
                        <div class="carousel-item active">
                            <img src="img/lab.jpg" class="d-block w-100 img-fluid" alt="Beagle">
                        </div>
                        <div class="carousel-item active">
                            <img src="img/lovebird.jpg" class="d-block w-100 img-fluid" alt="Beagle">
                        </div>
                        <div class="carousel-item active">
                            <img src="img/orange.jpg" class="d-block w-100 img-fluid" alt="Beagle">
                        </div>
                        <div class="carousel-item active">
                            <img src="img/parakeet.jpg" class="d-block w-100 img-fluid" alt="Beagle">
                        </div>
                        <div class="carousel-item">
                            <img src="img/siamese.jpg" class="d-block w-100 img-fluid" alt="Cockatiel">
                        </div>
                        <div class="carousel-item">
                            <img src="img/tabby.jpg" class="d-block w-100 img-fluid" alt="Golden">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carouselExample"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>
            </div>
        </div>
        <div class="row  justify-content-center mb-4">
            <div class="col-6">
                <h2 class="text-center mb-3 col-6">Bird Carousel</h2>
                <div id="carousel2" class="carousel slide carousel-fade">
                    <div class="carousel-indicators">
                        <button type="button" data-bs-target="#carousel2" data-bs-slide-to="0" class="active"
                            aria-current="true" aria-label="Slide 1"></button>
                        <button type="button" data-bs-target="#carousel2" data-bs-slide-to="1"
                            aria-label="Slide 2"></button>
                        <button type="button" data-bs-target="#carousel2" data-bs-slide-to="2"
                            aria-label="Slide 3"></button>
                    </div>
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="img/cockatiel.jpg" class="d-block w-100 img-fluid" alt="Cockatiel">
                        </div>
                        <div class="carousel-item">
                            <img src="img/lovebird.jpg" class="d-block w-100 img-fluid" alt="Lovebird">
                        </div>
                        <div class="carousel-item">
                            <img src="img/parakeet.jpg" class="d-block w-100 img-fluid" alt="Parakeet">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#carousel2"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carousel2"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>
            </div>
            <div class="col-6">
                <h2 class="text-center mb-3">Cat Carousel</h2>
                <div id="catCarousel" class="carousel slide carousel-fade">
                    <div class="carousel-indicators">
                        <button type="button" data-bs-target="#catCarousel" data-bs-slide-to="0" class="active"
                            aria-current="true" aria-label="Slide 1"></button>
                        <button type="button" data-bs-target="#catCarousel" data-bs-slide-to="1"
                            aria-label="Slide 2"></button>
                        <button type="button" data-bs-target="#catCarousel" data-bs-slide-to="2"
                            aria-label="Slide 3"></button>
                    </div>
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="img/orange.jpg" class="d-block w-100 img-fluid" alt="Orange">
                            <div class="carousel-caption d-none d-md-block">
                                <h5>Orange Cat</h5>
                                <p> orange cat</p>
                            </div>
                        </div>
                        <div class="carousel-item">
                            <img src="img/siamese.jpg" class="d-block w-100 img-fluid" alt="Siamese">
                            <div class="carousel-caption d-none d-md-block">
                                <h5>Siamese Cat</h5>
                                <p>Elegant Siamese breed.</p>
                            </div>
                        </div>
                        <div class="carousel-item">
                            <img src="img/tabby.jpg" class="d-block w-100 img-fluid" alt="Tabby">
                            <div class="carousel-caption d-none d-md-block">
                                <h5>Tabby Cat</h5>
                                <p> tabby kitten.</p>
                            </div>
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#catCarousel"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#catCarousel"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>
            </div>
        </div>
        <h2 class="text-center mb-3">Small Dog Carousel</h2>
        <div class="row justify-content-center ">
            <div class="col-3">
                <div id="carouselExampleFade" class="carousel slide carousel-fade carousel-fade">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="img/beagle.jpg" class="d-block w-100 img-fluid" alt="Beagle">
                        </div>
                        <div class="carousel-item">
                            <img src="img/golden.jpg" class="d-block w-100 img-fluid" alt="Golden">
                        </div>
                        <div class="carousel-item">
                            <img src="img/lab.jpg" class="d-block w-100 img-fluid" alt="Lab">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleFade"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleFade"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
